<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>视频预览网站</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" id="app"></main>
    <template id="home-template">
      <section class="home-page">
        <header class="top-categories" id="category-list"></header>
        <section class="poster-grid" id="series-grid"></section>
      </section>
    </template>

    <template id="detail-template">
      <section class="detail-page">
        <button id="back-home" class="back-btn">← 返回首页</button>
        <section class="player-wrap">
          <video id="player" controls preload="metadata"></video>
          <div class="episode-row" id="episode-row"></div>
          <p id="player-meta"></p>
        </section>
      </section>
    </template>

    <script src="app.js"></script>
  </body>
</html>
